# ────────────────────────────────────────────────
#   H Y P R L A N D   B A S I C   S E T T I N G S
#   See: https://wiki.hypr.land/Configuring/Keywords/
# ────────────────────────────────────────────────
# Sets "Windows" key as main modifier
$mainMod = SUPER       
$scriptsDir = $HOME/.config/hypr/Scripts
$localScript = $HOME/.local/bin
$quickshell = pgrep -x qs && hyprctl dispatch global

# launchables,.,., rawr
bind = $mainMod, Q, killactive,
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, exec, $editor
bind = $mainMod, B, exec, $browser

# scripts
bind = $mainMod, period, exec, $scriptsDir/EmojiRofi.sh
bind = $mainMod CTRL, S, exec, $scriptsDir/ShowCaseMode.sh
bind = $mainMod, P, exec, grim -g "$(slurp)" - | satty -f - --copy-command wl-copy

bind = $mainMod, W, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, D, togglesplit, # dwindle
bind = $mainMod, G, togglegroup

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, workspace, e+1
bind = $mainMod SHIFT, L, workspace, e-1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, C, togglespecialworkspace, magic
bind = $mainMod SHIFT, C, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, movefocus, l
bind = $mainMod, mouse_up, movefocus, r

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, minus, layoutmsg, colresize -0.2
bind = $mainMod, equal, layoutmsg, colresize +0.2
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col

bind = $mainMod SHIFT, comma, layoutmsg, swapcol l
bind = $mainMod SHIFT, period, layoutmsg, swapcol r

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = ,F11,exec,$localScript/volume-control.sh --dec
bind = ,F12,exec,$localScript/volume-control.sh --inc

# qml
bindd = $mainMod, A, App Menu, exec, pkill -x rofi || $menu
bindd = $mainMod, S, Show Quickshell Settings, exec, pcli launch shell-settings
bindd = $mainMod, Z, Show Screen Overlay, exec, $quickshell quickshell:showScreenOverLay

bind = $mainMod, DELETE,exec, pkill -x qs
