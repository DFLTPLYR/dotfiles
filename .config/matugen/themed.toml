[config]
base16_backend = "wal"

[catalog.steam]
name = "Steam"
category = "misc"

[templates.millennium]
input_path = 'templates/themed/steam.css'
output_path = '~/.steam/steam/steamui/skins/Material-Theme/css/main/colors/matugen.css'

[templates.themed_office]
input_path = "templates/themed/onlyoffice.json.template"
# output_path = "~/.config/onlyoffice/matugen.json"
output_path = "~/.local/share/onlyoffice/desktopeditors/uithemes/matugen.json"

[templates.themed_helix]
input_path = "templates/themed/helix.toml"
output_path = "~/.config/helix/themes/themed.toml"

[templates.themed_vesktop]
input_path = "templates/themed/vesktop.css"
output_path = "~/.config/vesktop/themes/vesktop.css"

[templates.themed_opencode]
input_path = "templates/themed/open-code.json"
output_path = "~/.config/opencode/themes/matugen.json"

[templates.themed_hypr]
input_path = "templates/themed/hypr/colors.lua"
output_path = "~/.config/hypr/config/colors.lua"

[templates.themed_qt5ct]
input_path = "templates/themed/qtct.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"

[templates.themed_qt6ct]
input_path = "templates/themed/qtct.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"

[templates.themed_gtk3]
input_path = "templates/themed/gtk3-colors.css"
output_path = "~/.config/gtk-3.0/colors.css"
post_hook = 'if command -v gsettings >/dev/null 2>&1; then gsettings set org.gnome.desktop.interface gtk-theme "" && gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-dark; fi'

[templates.themed_gtk4]
input_path = "templates/themed/gtk-colors.css"
output_path = "~/.config/gtk-4.0/colors.css"

[templates.themed_kitty]
input_path = "templates/themed/kitty-colors.conf"
output_path = "~/.config/kitty/current-theme.conf"

[templates.themed_neovim]
input_path = "templates/themed/nvim-colors.lua"
output_path = "~/.config/nvim/theme.lua"
post_hook = 'echo "[$(date "+%Y-%m-%d %H:%M:%S")] matugen ran - themed_neovim" >> ~/nvim-log.txt; pkill -SIGUSR1 nvim 2>/dev/null || true'

[templates.themed_rofi]
input_path = "templates/themed/rofi-colors.rasi"
output_path = "~/.config/rofi/colors.rasi"

[templates.themed_btop]
input_path = "templates/themed/btop.theme"
output_path = "~/.config/btop/themes/matugen.theme"

[templates.themed_niri]
input_path = "templates/themed/niri-colors.kdl"
output_path = "~/.config/niri/modules/colors.kdl"
post_hook = 'niri msg action load-config-file 2>/dev/null || true'

[templates.themed_zenChrome]
input_path = "templates/themed/userChrome.css"
output_path = "~/dotfiles/.config/matugen/data/themed-userChrome.css"
pre_hook = '''
for dir in ~/.config/zen ~/.zen; do
  PROFILE_DIR=$(find "$dir" -maxdepth 1 -type d -name "*.Default*" 2>/dev/null | head -n 1)
  [ -n "$PROFILE_DIR" ] && break
done
if [ -n "$PROFILE_DIR" ]; then
  mkdir -p "$PROFILE_DIR/chrome"
  [ -L "$PROFILE_DIR/chrome/userChrome.css" ] || ln -sf ~/dotfiles/.config/matugen/data/themed-userChrome.css "$PROFILE_DIR/chrome/userChrome.css"
fi
'''

[templates.themed_zenContent]
input_path = "templates/themed/userContent.css"
output_path = "~/dotfiles/.config/matugen/data/themed-userContent.css"
pre_hook = '''
for dir in ~/.config/zen ~/.zen; do
  PROFILE_DIR=$(find "$dir" -maxdepth 1 -type d -name "*.Default*" 2>/dev/null | head -n 1)
  [ -n "$PROFILE_DIR" ] && break
done
if [ -n "$PROFILE_DIR" ]; then
  mkdir -p "$PROFILE_DIR/chrome"
  [ -L "$PROFILE_DIR/chrome/userContent.css" ] || ln -sf ~/dotfiles/.config/matugen/data/themed-userContent.css "$PROFILE_DIR/chrome/userContent.css"
fi
'''

[templates.themed_test]
input_path = "templates/themed/test.json"
output_path = "~/.config/matugen/test.json"

[templates.themed_rmpc]
input_path = "templates/themed/rmpc/shell.ron"
output_path = "~/.config/rmpc/layout/shell.ron"
